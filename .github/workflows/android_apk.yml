name: Build Android APK

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # 1. سحب الكود من المستودع (يجب أن تكون الخطوة الأولى دائماً)
      - name: Checkout the code
        uses: actions/checkout@v4

      # 2. إعداد بيئة جافا 17 وتفعيل الكاش لتسريع البناء مستقبلاً
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. إعطاء صلاحية التشغيل لملف gradlew فوراً بعد سحب الكود وجافا
      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      # 4. توليد ملف debug.keystore مؤقت في المجلد الرئيسي لمنع فشل التوقيع
      - name: Create temporary debug.keystore
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "C=US, O=Android, CN=Android Debug"

      # 5. توليد ملف google-services.json وهمي لتخطي فحص الـ Plugin
      - name: Create dummy google-services.json
        run: |
          cat <<EOF > app/google-services.json
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy-project"
            },
            "client": [
              {
                "client_info": {
                  "mobilesdk_app_id": "1:000000000000:android:0000000000000000000000",
                  "android_client_info": {
                    "package_name": "com.example"
                  }
                },
                "api_key": [
                  {
                    "current_key": "dummy_key"
                  }
                ]
              }
            ]
          }
          EOF

      # 6. تشغيل عملية بناء التطبيق
      - name: Build Debug APK
        run: ./gradlew assembleDebug

      # 7. رفع ملف الـ APK الناتج ليكون قابلاً للتحميل من الـ Actions
      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk
